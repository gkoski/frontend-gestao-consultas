<header class="flex items-center justify-between w-full">
    <h1 class="text-3xl mt-5 ml-5 mb-5 text-[#1B3A6B] font-bold">Especialidades</h1>
    <button mat-flat-button color="primary" type="submit" class="mr-5" (click)="abrirModalCriar(especialidades)">
        <mat-icon fontIcon="add"></mat-icon>
        Criar
    </button>
</header>

<body class="bg-[#FAFBFF]">
    <div>
        <form>
            <mat-card class="!shadow-sm">
                <mat-card-content>
                    <mat-form-field class="w-full">
                        <mat-label>Nome da especialidade:</mat-label>
                        <input matInput name="busca" [(ngModel)]="nomeBusca">
                    </mat-form-field>
                </mat-card-content>

                <mat-card-actions>
                    <button mat-flat-button color="primary" type="submit" (click)="buscar()">
                        <mat-icon fontIcon="search"></mat-icon>
                        Buscar
                    </button>
                </mat-card-actions>
            </mat-card>
        </form>
    </div>

    <div>
        <h2 class="text-xl mt-5 ml-5 mb-5 text-[#1B3A6B] font-semibold">Resultado</h2>
        <div class="bg-white rounded-3xl p-6 shadow-sm">
            <table class="w-full table-fixed text-center border-collapse">
                <thead>
                    <tr class="text-sm text-gray-500 border-b border-gray-200">
                        <th class="pb-2 font-medium">ID</th>
                        <th class="pb-2 font-medium">Nome</th>
                    </tr>
                </thead>

                <tbody>
                    @for (especialidade of especialidadesFiltradas; track especialidade.id) {
                    <tr class="border-b border-gray-100">
                        <td class="py-3 text-sm">{{ especialidade.id }}</td>
                        <td class="py-3 text-sm font-medium">{{ especialidade.nome }}</td>
                    </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</body>
