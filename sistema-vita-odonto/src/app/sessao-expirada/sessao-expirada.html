<h2 mat-dialog-title>Sessão expirada</h2>
<mat-dialog-content>
    <p class="text-sm text-gray-600">
        Sua sessão expirou por inatividade. Faça login novamente para continuar.
    </p>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-flat-button color="primary" (click)="logarNovamente()">
        Logar novamente
    </button>
</mat-dialog-actions>
